function parseExcelRows(rawData) {
  return rawData.slice(1)
    .filter(r => r.length > 0 && r[0])
    .map(r => ({
      연번:         parseInt(r[0]) || 0,
      부번:         parseInt(r[1]) || 1,
      이름:         String(r[5]  || '').trim(),
      생년월일:     String(r[12] || '').trim(),
      성별:         String(r[11] || '').trim(),
      전화번호:     '',
      얼마집_인증:  (() => { const v = String(r[8]||'').trim(); return v === 'O' ? 'O' : null; })(),
      얼마집_인증일:(() => { const v = String(r[9]||'').trim(); return (v && v !== '-') ? v : null; })(),
      소유형태:     String(r[10] || '').trim(),
      등기유형:     String(r[7]  || '').trim(),
      등기원인일:   String(r[20] || '').trim(),
      거주구분:     String(r[15] || '').trim(),
      등기상주소:   String(r[13] || '').trim(),
      지분별토지:   parseFloat(r[17]) || null,
      등기고유번호: String(r[21] || '').trim(),
      동:           String(r[3]  || '').trim(),
      호:           String(r[4]  || '').trim(),
    }))
    .filter(r => r.연번 > 0 && r.등기고유번호);
}

function classifyChanges(dbByProp, exByProp) {
  const results = {
    dataUpdate:[], ownerReplace:[], soloToJointKeep:[], soloToJointNew:[],
    jointToSolo:[], jointPartial:[], jointToJoint:[],
    newProperty:[], missingInExcel:[],
  };
  for(const [uid, exRows] of Object.entries(exByProp)) {
    if(!dbByProp[uid]) results.newProperty.push(...exRows);
  }
  for(const [uid, dbRows] of Object.entries(dbByProp)) {
    if(!exByProp[uid]) results.missingInExcel.push(...dbRows);
  }
  for(const uid of Object.keys(dbByProp)) {
    if(!exByProp[uid]) continue;
    const dbs = dbByProp[uid];
    const exs = exByProp[uid];
    const dbKeys = new Set(dbs.map(r => `${r.owner?.이름}|${r.owner?.생년월일_사업자번호}`));
    const exKeys = new Set(exs.map(r => `${r.이름}|${r.생년월일}`));
    const dbSize = dbs.length, exSize = exs.length;
    const sameOwners = dbSize === exSize &&
      [...exKeys].every(k => dbKeys.has(k)) && [...dbKeys].every(k => exKeys.has(k));

    if(sameOwners) {
      const diffs = [];
      exs.forEach(ex => {
        const dbRow = dbs.find(d => d.owner?.이름 === ex.이름 && d.owner?.생년월일_사업자번호 === ex.생년월일);
        if(!dbRow) return;
        const rowDiffs = [];
        if(dbRow['연번'] !== ex.연번) rowDiffs.push({field:'연번', db:dbRow['연번'], excel:ex.연번});
        if((dbRow['소유형태']||'') !== ex.소유형태 && ex.소유형태) rowDiffs.push({field:'소유형태', db:dbRow['소유형태']||'—', excel:ex.소유형태});
        if((dbRow['등기유형']||'') !== ex.등기유형 && ex.등기유형) rowDiffs.push({field:'등기유형', db:dbRow['등기유형']||'—', excel:ex.등기유형});
        if((dbRow['거주구분']||'') !== ex.거주구분 && ex.거주구분) rowDiffs.push({field:'거주구분', db:dbRow['거주구분']||'—', excel:ex.거주구분});
        const db_인증  = (dbRow.얼마집_인증  === 'O') ? 'O' : null;
        const db_인증일 = (dbRow.얼마집_인증일 && dbRow.얼마집_인증일 !== '-' && dbRow.얼마집_인증일 !== '—') ? dbRow.얼마집_인증일 : null;
        if(db_인증  !== ex.얼마집_인증)  rowDiffs.push({field:'얼마집_인증',  db:db_인증 ??'—', excel:ex.얼마집_인증 ??'—', target:'reg'});
        if(db_인증일 !== ex.얼마집_인증일) rowDiffs.push({field:'얼마집_인증일', db:db_인증일??'—', excel:ex.얼마집_인증일??'—', target:'reg'});
        if(rowDiffs.length) diffs.push({ dbRow, ex, diffs: rowDiffs });
      });
      if(diffs.length) results.dataUpdate.push({ 등기고유번호:uid, dbs, exs, diffs });
      continue;
    }
    const dbSolo = dbSize === 1, exSolo = exSize === 1;
    const exOwnerKeys = [...exKeys];
    const commonKeys = exOwnerKeys.filter(k => dbKeys.has(k));
    const entry = { 등기고유번호:uid, dbs, exs };
    if(dbSolo && exSolo)          results.ownerReplace.push(entry);
    else if(dbSolo && !exSolo)    (commonKeys.length > 0 ? results.soloToJointKeep : results.soloToJointNew).push(entry);
    else if(!dbSolo && exSolo)    results.jointToSolo.push(entry);
    else                          (commonKeys.length === 0 ? results.jointToJoint : results.jointPartial).push(entry);
  }
  return results;
}

async function handleRosterImport(event) {
  const file = event.target.files[0]; if(!file) return;
  document.getElementById('roster-file-name').textContent = file.name;
  const resultEl = document.getElementById('roster-compare-result');
  const progEl   = document.getElementById('roster-progress');
  progEl.style.display = '';
  const setP = msg => { progEl.textContent = msg; };
  resultEl.innerHTML = '';
  try {
    setP('엑셀 파싱 중...');
    const ab = await file.arrayBuffer();
    const wb = XLSX.read(ab, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rawData = XLSX.utils.sheet_to_json(ws, {header:1});
    const excelRows = parseExcelRows(rawData);
    if(!excelRows.length) {
      resultEl.innerHTML = '<div class="empty-state"><p>유효한 데이터가 없습니다. (등기고유번호 22번째 컬럼 확인)</p></div>';
      progEl.style.display='none'; return;
    }

    setP(`엑셀 ${excelRows.length}건 — 부동산 매칭 중...`);
    const allUids = [...new Set(excelRows.map(r => r.등기고유번호).filter(Boolean))];
    const propMap = {};
    for(let i=0; i<allUids.length; i+=500) {
      const {data:props} = await _sb.from('property').select('부동산코드,등기고유번호').in('등기고유번호', allUids.slice(i,i+500));
      (props||[]).forEach(p => { propMap[p.등기고유번호] = p.부동산코드; });
    }
    const unmatchedExcel = [];
    excelRows.forEach(r => { r.부동산코드 = propMap[r.등기고유번호]||null; if(!r.부동산코드) unmatchedExcel.push(r); });
    const matchedExcel = excelRows.filter(r => r.부동산코드);

    setP('DB 로드 중...');
    const allPropCodes = [...new Set(matchedExcel.map(r => r.부동산코드))];
    const dbRows = [];
    for(let i=0; i<allPropCodes.length; i+=500) {
      const {data:chunk} = await _sb.from('registration')
        .select('연번,부번,부동산코드,소유형태,등기유형,등기원인일,거주구분,얼마집_인증,얼마집_인증일,is_current,owner_id,owner:owner_id(id,이름,생년월일_사업자번호,성별,전화번호)')
        .in('부동산코드', allPropCodes.slice(i,i+500)).eq('is_current', true);
      if(chunk) dbRows.push(...chunk);
    }

    setP('소유 구성 비교 중...');
    const dbByCode = {};
    dbRows.forEach(r => { const c=r['부동산코드']; if(!dbByCode[c]) dbByCode[c]=[]; dbByCode[c].push(r); });
    const codeToUid = {};
    Object.entries(propMap).forEach(([uid,code]) => { codeToUid[code]=uid; });
    const dbByProp = {};
    Object.entries(dbByCode).forEach(([code,rows]) => { const uid=codeToUid[code]; if(uid) dbByProp[uid]=rows; });
    const exByProp = {};
    matchedExcel.forEach(r => { if(!exByProp[r.등기고유번호]) exByProp[r.등기고유번호]=[]; exByProp[r.등기고유번호].push(r); });

    const classified = classifyChanges(dbByProp, exByProp);
    classified.newProperty = [...(classified.newProperty||[]), ...unmatchedExcel];
    window._rosterClassified = classified;

    progEl.style.display='none';
    renderRosterResult(classified, excelRows.length, dbRows.length);
  } catch(e) {
    resultEl.innerHTML = `<div class="empty-state"><p>오류: ${e.message}</p></div>`;
    progEl.style.display='none'; console.error(e);
  }
}

    return '<tr><td>'+r.연번+'</td><td>'+r.이름+'</td>'
      +'<td class="mono" style="font-size:11px">'+(r.등기고유번호||'—')+'</td>'
      +'<td>'+(r.동||'')+'동 '+(r.호||'')+'호</td></tr>';
  }).join('') + (items.length>50 ? '<tr><td colspan="4" style="text-align:center;color:var(--text3)">... 외 '+(items.length-50)+'건</td></tr>' : '');
}
function buildMissingRows(items) {

    return '<tr><td>'+r['연번']+'</td><td>'+(r.owner&&r.owner.이름||'—')+'</td>'

function buildTabHtml(tabs) {

    + tabs.map(function(t,i){
        return '<div class="roster-tab'+(i===0?' active':'')+'" data-tab="'+t.key+'" onclick="switchRosterTab(\''+t.key+'\')" '
          +'style="padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid '+(i===0?'var(--accent)':'transparent')+';margin-bottom:-2px;color:'+(i===0?'var(--accent)':'var(--text2)')+';transition:all 0.15s">'+t.label+'</div>';

}

    soloToJointKeep: {color:'var(--yellow)', label:'③ 단독→공동(기존포함)'},
    soloToJointNew:  {color:'var(--red)',    label:'④ 단독→공동(완전교체)'},
    jointToSolo:     {color:'var(--red)',    label:'⑤ 공동→단독'},
    jointPartial:    {color:'var(--yellow)', label:'⑥ 공동 일부 교체'},
    jointToJoint:    {color:'var(--red)',    label:'⑦ 공동→공동 완전교체'},
  };
  var summaryHtml = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">'
    +'<div class="stat-card"><div class="stat-label">엑셀 행 수</div><div class="stat-value" style="color:var(--accent)">'+exTotal.toLocaleString()+'</div><div class="stat-sub">DB '+dbTotal.toLocaleString()+'건</div></div>'
    +'<div class="stat-card" style="border-color:var(--red)"><div class="stat-label">🔴 소유주 변경</div><div class="stat-value" style="color:var(--red)">'+(c.ownerReplace.length+c.soloToJointNew.length+c.jointToSolo.length+c.jointToJoint.length)+'</div><div class="stat-sub">②④⑤⑦</div></div>'
    +'<div class="stat-card" style="border-color:var(--yellow)"><div class="stat-label">🟡 소유구성 변경</div><div class="stat-value" style="color:var(--yellow)">'+(c.soloToJointKeep.length+c.jointPartial.length)+'</div><div class="stat-sub">③⑥</div></div>'
    +'<div class="stat-card" style="border-color:var(--green)"><div class="stat-label">🔵 데이터 / ⚠️ 신규·누락</div><div class="stat-value" style="color:var(--green)">'+c.dataUpdate.length+' <span style="color:var(--text3);font-size:12px">/ '+(c.newProperty.length+c.missingInExcel.length)+'</span></div><div class="stat-sub">정보변경 / 신규·누락</div></div>'
    +'</div>';

  function makeCaseRows(caseKey, items) {
    return items.map(function(item, idx) {
      var propCode = (item.dbs&&item.dbs[0] ? item.dbs[0]['부동산코드'] : null) || (item.exs&&item.exs[0] ? item.exs[0].부동산코드 : null) || item.등기고유번호||'';
      var dbNames = (item.dbs||[]).map(function(d){ return (d.owner&&d.owner.이름||'?')+'('+(d.owner&&d.owner.생년월일_사업자번호||'?')+')'; }).join(', ');
      var exNames = (item.exs||[]).map(function(e){ return e.이름+'('+(e.생년월일||'?')+')'; }).join(', ');
      var yeonbunDB = [...new Set((item.dbs||[]).map(function(d){return d['연번'];}))].join(',');
      var yeonbunEx = [...new Set((item.exs||[]).map(function(e){return e.연번;}))].join(',');
      return '<tr id="caserow-'+caseKey+'-'+idx+'">'

        +'<td style="font-size:11px;color:var(--text2)">'+(dbNames||'—')+'<br><span style="color:var(--text3)">연번: '+yeonbunDB+'</span></td>'
        +'<td style="font-size:11px;color:var(--green);font-weight:500">'+(exNames||'—')+'<br><span style="color:var(--text3)">연번: '+yeonbunEx+'</span></td>'

      +'<td style="text-align:center"><input type="checkbox" class="case-chk" data-case="dataUpdate" data-idx="'+idx+'"></td>'

  if(!c.newProperty.length && !c.missingInExcel.length) {
    newMissingHtml = '<div class="empty-state" style="padding:20px"><p>없음</p></div>';
  }

  var tabContents = {
    소유주변경: ['ownerReplace','soloToJointNew','jointToSolo','jointToJoint'].map(function(k){return makeCaseSection(k,c[k]||[]);}).join('')||'<div class="empty-state" style="padding:20px"><p>없음</p></div>',
    소유구성변경: ['soloToJointKeep','jointPartial'].map(function(k){return makeCaseSection(k,c[k]||[]);}).join('')||'<div class="empty-state" style="padding:20px"><p>없음</p></div>',
    데이터업데이트: c.dataUpdate.length
      ? '<div class="table-wrap" style="max-height:320px;overflow-y:auto"><table><thead><tr>'
        +'<th style="width:36px"><input type="checkbox" onchange="toggleCaseSelect(\'dataUpdate\',this.checked)"></th>'
        +'<th>부동산코드</th><th>소유주</th><th>변경 항목</th>'
        +'</tr></thead><tbody>'+dataUpdateRows+'</tbody></table></div>'
      : '<div class="empty-state" style="padding:20px"><p>없음</p></div>',
    신규누락: newMissingHtml,
  };
  window._rosterTabContents = tabContents;

  var tabs = [
    {key:'소유주변경',   label:'소유주 변경 ('+(c.ownerReplace.length+c.soloToJointNew.length+c.jointToSolo.length+c.jointToJoint.length)+')'},
    {key:'소유구성변경', label:'소유구성 변경 ('+(c.soloToJointKeep.length+c.jointPartial.length)+')'},
    {key:'데이터업데이트', label:'데이터 업데이트 ('+c.dataUpdate.length+')'},
    {key:'신규누락',    label:'신규·누락 ('+(c.newProperty.length+c.missingInExcel.length)+')'},
  ];

  resultEl.innerHTML = summaryHtml
    + '<div class="card">'
    + buildTabHtml(tabs)
    + '<div id="roster-tab-content">'+tabContents['소유주변경']+'</div>'
    + '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">'
    + '<button class="btn btn-ghost" onclick="document.querySelectorAll(\'.case-chk\').forEach(function(c){c.checked=false;})">전체 해제</button>'
    + '<button class="btn btn-blue" onclick="applySelectedChanges()" id="btn-apply-roster">✅ 선택 항목 적용</button>'
    + '</div></div>';
}

function switchRosterTab(key) {
  document.querySelectorAll('.roster-tab').forEach(el => {
    const a = el.dataset.tab===key;
    el.style.borderBottomColor = a?'var(--accent)':'transparent';
    el.style.color = a?'var(--accent)':'var(--text2)';
  });
  const cont = document.getElementById('roster-tab-content');
  if(cont) cont.innerHTML = (window._rosterTabContents||{})[key]||'';
}

function toggleCaseSelect(caseKey, checked) {
  document.querySelectorAll(`.case-chk[data-case="${caseKey}"]`).forEach(c => { c.checked=checked; });
}

async function applySelectedChanges() {
  const checked = [...document.querySelectorAll('.case-chk:checked')];
  if(!checked.length) { showToast('적용할 항목을 선택해주세요.','error'); return; }
  const c = window._rosterClassified;
  if(!c) { showToast('분석 결과가 없습니다. 파일을 다시 업로드해주세요.','error'); return; }

  const selected = {};
  checked.forEach(chk => { const k=chk.dataset.case, i=parseInt(chk.dataset.idx); if(!selected[k])selected[k]=[]; selected[k].push(i); });

  if(!confirm(`선택된 ${checked.length}건을 DB에 적용합니다. 이 작업은 되돌리기 어렵습니다. 계속하시겠습니까?`)) return;
  const btn = document.getElementById('btn-apply-roster');
  if(btn) { btn.disabled=true; btn.textContent='처리 중...'; }

  const {data:{user}} = await _sb.auth.getUser();
  const {data:appUser} = await _sb.from('app_user').select('name').eq('username', user?.email||'').single();
  const processor = appUser?.name||'위원장';

  let ok=0, fail=0;

  // ① 데이터 업데이트
  for(const idx of (selected.dataUpdate||[])) {
    const item = c.dataUpdate[idx];
    try {
      for(const {dbRow, ex, diffs} of item.diffs) {
        const ownerUpd={}, regUpd={};
        diffs.forEach(d => {
          if(d.field==='소유형태')    regUpd.소유형태=d.excel;
          if(d.field==='등기유형')    regUpd.등기유형=d.excel;
          if(d.field==='거주구분')    regUpd.거주구분=d.excel;
          if(d.field==='연번')        regUpd.연번=d.excel;
          if(d.field==='얼마집_인증')  regUpd.얼마집_인증=d.excel;
          if(d.field==='얼마집_인증일') regUpd.얼마집_인증일=d.excel;
        });
        if(Object.keys(ownerUpd).length) await _sb.from('owner').update(ownerUpd).eq('id', dbRow.owner_id);
        if(Object.keys(regUpd).length)   await _sb.from('registration').update(regUpd).eq('부동산코드',dbRow['부동산코드']).eq('owner_id',dbRow.owner_id).eq('is_current',true);
      }
      ok++; markRowDone(`caserow-dataUpdate-${idx}`);
    } catch(e) { fail++; console.error('dataUpdate', item.등기고유번호, e); }
  }

  // ②~⑦ 소유주/소유구성 변경 공통 처리
  async function processOwnerChange(item, caseLabel) {
    const rawDate = (item.exs[0]?.등기원인일||'').replace(/\./g,'-').replace(/[^0-9\-]/g,'').slice(0,10)||null;
    const 소유종료일 = rawDate||null;
    const propCode = item.dbs[0]?.['부동산코드'] || item.exs[0]?.부동산코드;

    for(const dbRow of item.dbs) {
      await _sb.from('registration').update({is_current:false, 소유종료일}).eq('부동산코드',propCode).eq('owner_id',dbRow.owner_id).eq('is_current',true);
      await _sb.from('payment').update({is_previous_owner:true}).eq('연번',dbRow['연번']).eq('owner_id',dbRow.owner_id);
    }

    const newOwnerIds=[];
    for(let i=0;i<item.exs.length;i++) {
      const ex=item.exs[i];
      let newId=null;
      const {data:existing}=await _sb.from('owner').select('id').eq('이름',ex.이름).eq('생년월일_사업자번호',ex.생년월일||'').maybeSingle();
      if(existing?.id) { newId=existing.id; if(ex.전화번호) await _sb.from('owner').update({전화번호:ex.전화번호}).eq('id',newId); }
      else {
        const {data:ins,error:insErr}=await _sb.from('owner').insert({이름:ex.이름,생년월일_사업자번호:ex.생년월일||'',성별:ex.성별||null,전화번호:ex.전화번호||null}).select('id').single();
        if(insErr) throw insErr;
        newId=ins.id;
      }
      newOwnerIds.push(newId);
      await _sb.from('registration').insert({연번:ex.연번,부동산코드:propCode,owner_id:newId,부번:ex.부번||(i+1),대표소유주:(ex.부번||i+1)===1,소유형태:ex.소유형태||null,등기유형:ex.등기유형||null,등기원인일:ex.등기원인일||null,거주구분:ex.거주구분||null,등기상주소:ex.등기상주소||null,is_current:true});
    }

    const oldYeonbuns=[...new Set(item.dbs.map(d=>d['연번']))];
    for(const yn of oldYeonbuns) {
      await _sb.from('consent').update({상태:'미제출',접수방법:null,제출일시:null,수정자:processor}).eq('연번',yn).neq('상태','미제출');
    }

    for(let i=0;i<item.dbs.length;i++) {
      const dbRow=item.dbs[i];
      await _sb.from('owner_change_log').insert({부동산코드:propCode,연번_전:dbRow['연번'],연번_후:item.exs[0]?.연번,owner_id_전:dbRow.owner_id,owner_id_후:newOwnerIds[0],이름_전:dbRow.owner?.이름,이름_후:item.exs[0]?.이름,생년월일_전:dbRow.owner?.생년월일_사업자번호,생년월일_후:item.exs[0]?.생년월일,소유종료일,변경사유:caseLabel,처리자:processor});
    }
  }

  const changeCases=[['ownerReplace','② 단독→단독 교체'],['soloToJointNew','④ 단독→공동 완전교체'],['jointToSolo','⑤ 공동→단독'],['jointToJoint','⑦ 공동→공동 완전교체'],['soloToJointKeep','③ 단독→공동(기존포함)'],['jointPartial','⑥ 공동 일부 교체']];
  for(const [caseKey,caseLabel] of changeCases) {
    for(const idx of (selected[caseKey]||[])) {
      const item=c[caseKey][idx];
      try { await processOwnerChange(item,caseLabel); ok++; markRowDone(`caserow-${caseKey}-${idx}`); }
      catch(e) { fail++; console.error(caseLabel, item.등기고유번호, e); }
    }
  }

  if(btn) { btn.disabled=false; btn.textContent='✅ 선택 항목 적용'; }
  showToast('처리 완료: '+ok+'건 성공'+(fail?', '+fail+'건 실패':''), ok>0&&!fail?'success':'error');
}

function markRowDone(rowId) {
  const row=document.getElementById(rowId);
  if(row){row.style.opacity='0.4';row.style.background='var(--green-soft)';}
}

// ════════════════════════════════════════════════
// 유틸
// ════════════════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`show ${type}`;
  setTimeout(()=>{t.className='';},2800);
}
</script>
