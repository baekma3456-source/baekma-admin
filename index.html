<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백마마을 재건축 — 관리자앱 v2.24</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5; --bg2: #ffffff; --bg3: #f5f7fa; --bg4: #eaecf0;
  --border: #dde1e9; --border2: #c5cad6;
  --accent: #3b6ff5; --accent2: #2a5ce0; --accent-soft: rgba(59,111,245,0.10);
  --green: #1a9e5c; --green-soft: rgba(26,158,92,0.10);
  --red: #e03333; --red-soft: rgba(224,51,51,0.10);
  --yellow: #c68e00; --yellow-soft: rgba(198,142,0,0.10);
  --text: #1a1d26; --text2: #5a6078; --text3: #9098b0;
  --sidebar-w: 220px; --radius: 10px;
  --font: 'Noto Sans KR', sans-serif; --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }

/* ── 로그인 ── */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,111,245,0.10) 0%, transparent 70%), var(--bg); }
.login-box { width: 380px; padding: 48px 40px; background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 24px 80px rgba(0,0,0,0.12); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 52px; height: 52px; border-radius: 14px; background: var(--accent); font-size: 22px; margin-bottom: 14px; }
.login-logo h1 { font-size: 17px; font-weight: 600; }
.login-logo p { font-size: 12px; color: var(--text3); margin-top: 4px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
.form-group input { width: 100%; padding: 11px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s; }
.form-group input:focus { border-color: var(--accent); }
.btn-primary { width: 100%; padding: 12px; margin-top: 8px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-primary:hover { background: var(--accent2); }
.login-err { color: var(--red); font-size: 12px; text-align: center; margin-top: 12px; min-height: 18px; }

/* ── 앱 레이아웃 ── */
#app { display: none; height: 100vh; }
#app.visible { display: flex; }
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-header { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
.sidebar-header .site-name { font-size: 12px; font-weight: 700; }
.sidebar-header .site-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.sidebar-user { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer; }
.user-avatar { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-soft); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--accent); font-weight: 700; flex-shrink: 0; }
.user-info .user-name { font-size: 13px; font-weight: 600; }
.sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-section-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; padding: 8px 8px 4px; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500; transition: background 0.15s, color 0.15s; margin-bottom: 2px; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); }
.nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--border); }
.btn-logout { width: 100%; padding: 9px 10px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text3); font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.btn-logout:hover { border-color: var(--red); color: var(--red); background: var(--red-soft); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 56px; flex-shrink: 0; padding: 0 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); }
.topbar-title { font-size: 16px; font-weight: 700; }
.topbar-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.topbar-kpi { display: flex; align-items: center; gap: 20px; }
.topbar-kpi-item { display: flex; align-items: center; gap: 8px; }
.topbar-kpi-item .kpi-val { font-size: 15px; font-weight: 700; font-family: var(--mono); }
.topbar-kpi-item .kpi-lbl { font-size: 11px; color: var(--text3); font-weight: 500; }
.topbar-kpi-divider { width: 1px; height: 20px; background: var(--border); }
.content { flex: 1; overflow-y: auto; padding: 28px; }

/* ── 공통 컴포넌트 ── */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card-title { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
.section-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
.badge { display: inline-flex; align-items: center; justify-content: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-green { background: var(--green-soft); color: var(--green); }
.badge-red { background: var(--red-soft); color: var(--red); }
.badge-yellow { background: var(--yellow-soft); color: var(--yellow); }
.badge-blue { background: var(--accent-soft); color: var(--accent); }
.badge-gray { background: rgba(90,98,128,0.2); color: var(--text3); }
.btn { padding: 8px 16px; border-radius: 8px; border: none; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-blue { background: var(--accent); color: #fff; }
.btn-blue:hover { background: var(--accent2); }
.btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }
.btn-danger { background: var(--red-soft); color: var(--red); border: 1px solid transparent; }
.btn-danger:hover { border-color: var(--red); }
.btn-green { background: var(--green-soft); color: var(--green); border: 1px solid transparent; }
.btn-green:hover { border-color: var(--green); }
.input { padding: 9px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border-color 0.2s; }
.input:focus { border-color: var(--accent); }
select.input { cursor: pointer; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.05em; border-bottom: 1px solid var(--border); background: var(--bg3); }
tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 10px 12px; font-size: 13px; }
tbody td.mono { font-family: var(--mono); font-size: 12px; color: var(--text2); }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-center { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 40px; color: var(--text3); }
.modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; width: 680px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; transform: translateY(12px) scale(0.98); transition: transform 0.2s; }
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
.modal-close { width: 28px; height: 28px; border-radius: 6px; background: var(--bg3); border: none; cursor: pointer; color: var(--text2); font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
.modal-close:hover { background: var(--bg4); }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-tabs { display: flex; gap: 4px; padding: 16px 24px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-tab { padding: 8px 16px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text3); border: 1px solid transparent; border-bottom: none; transition: all 0.15s; background: none; font-family: var(--font); }
.modal-tab.active { background: var(--bg2); color: var(--accent); border-color: var(--border); border-bottom-color: var(--bg2); }

/* ── 대시보드 ── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.stat-card .stat-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 8px; }
.stat-card .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.stat-card .stat-sub { font-size: 11px; color: var(--text3); margin-top: 6px; }
.stat-card.highlight { border-color: var(--accent); background: linear-gradient(135deg, var(--accent-soft), var(--bg2)); }
.stat-card.highlight .stat-value { color: var(--accent); }
.progress-bar-bg { height: 10px; background: var(--bg3); border-radius: 10px; overflow: hidden; margin-top: 8px; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 10px; transition: width 0.6s; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-top: 4px; }
.danji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.danji-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
.danji-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(59,111,245,0.12); }
.danji-card .danji-name { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
.danji-rate { font-size: 22px; font-weight: 700; font-family: var(--mono); }
.danji-rate span { font-size: 13px; font-weight: 400; color: var(--text3); }
.danji-detail { font-size: 11px; color: var(--text3); margin-top: 4px; }
.danji-bar { height: 4px; background: var(--bg3); border-radius: 4px; margin-top: 10px; overflow: hidden; }
.danji-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }

/* ── 소유주/동의 통합 탭 ── */
.filter-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; }
.filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
.filter-row:last-child { margin-bottom: 0; }
.filter-label { font-size: 11px; font-weight: 600; color: var(--text3); min-width: 70px; }
.chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); transition: all 0.15s; user-select: none; }
.chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.chip.green-on { background: var(--green-soft); border-color: var(--green); color: var(--green); }
.chip.red-on { background: var(--red-soft); border-color: var(--red); color: var(--red); }
.view-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.view-toggle button { padding: 7px 16px; font-size: 12px; font-weight: 600; border: none; background: var(--bg3); color: var(--text2); cursor: pointer; font-family: var(--font); transition: all 0.15s; }
.view-toggle button.on { background: var(--accent); color: #fff; }
.search-group { display: flex; gap: 8px; align-items: center; }
.result-count { font-size: 12px; color: var(--text3); margin-bottom: 10px; }

/* 소유주 상세 모달 */
.detail-kv { display: grid; grid-template-columns: 120px 1fr; gap: 10px 16px; }
.detail-kv .kv-key { font-size: 12px; color: var(--text3); font-weight: 500; padding-top: 1px; }
.detail-kv .kv-val { font-size: 13px; }
.prop-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.prop-tag { padding: 3px 10px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border); font-size: 12px; font-family: var(--mono); color: var(--text2); }
.consent-grid-modal { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.consent-cell { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 8px; text-align: center; }
.consent-cell .round-name { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.consent-cell .round-status { font-size: 12px; font-weight: 600; }
.consent-cell.submitted { border-color: var(--green); background: var(--green-soft); }
.consent-cell.submitted .round-status { color: var(--green); }
.consent-cell.opposed { border-color: var(--red); background: var(--red-soft); }
.consent-cell.opposed .round-status { color: var(--red); }

/* ── 운영경비 ── */
.pay-stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.pay-import-zone { border: 2px dashed var(--border2); border-radius: var(--radius); padding: 28px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg3); }
.pay-import-zone:hover { border-color: var(--accent); background: var(--accent-soft); }
.pay-import-zone input[type=file] { display: none; }

/* ── 활동기록 탭 ── */
.act-filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.act-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; }
.act-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.act-type-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: var(--accent-soft); color: var(--accent); }
.act-edit-btn { margin-left: auto; }

/* ── 설정 탭 ── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* ── 알림 토스트 ── */
#toast { position: fixed; bottom: 28px; right: 28px; z-index: 999; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; transform: translateY(20px); opacity: 0; transition: all 0.25s; pointer-events: none; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { background: var(--green); color: #fff; }
#toast.error { background: var(--red); color: #fff; }
#toast.info { background: var(--accent); color: #fff; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.empty-state { padding: 48px; text-align: center; color: var(--text3); }
.empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">🏘️</div>
      <h1>백마마을 통합재건축 주민대표단</h1>
      <p>관리자 전용 시스템 v2</p>
    </div>
    <div class="form-group"><label>이메일</label><input type="email" id="login-email" placeholder="이메일" autocomplete="email"></div>
    <div class="form-group"><label>비밀번호</label><input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="site-name">백마마을 통합재건축 주민대표단</div>
      <div class="site-sub">관리자앱 v2.23</div>
    </div>
    <div class="sidebar-user" onclick="openPasswordModal()" title="비밀번호 변경">
      <div class="user-avatar" id="user-avatar">위</div>
      <div class="user-info">
        <div class="user-name" id="user-name">위원장</div>
        <div style="font-size:10px;color:var(--text3)">🔑 비밀번호 변경</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-label">메뉴</div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')"><span class="nav-icon">📊</span> 종합</div>
      <div class="nav-item" data-page="owners" onclick="navigate('owners')"><span class="nav-icon">👥</span> 소유주명부</div>
      <div class="nav-item" data-page="payment" onclick="navigate('payment')"><span class="nav-icon">💰</span> 운영경비</div>
      <div class="nav-item" data-page="activity" onclick="navigate('activity')"><span class="nav-icon">📝</span> 활동기록</div>
      <div class="nav-item" data-page="settings" onclick="navigate('settings')"><span class="nav-icon">⚙️</span> 설정</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">🚪 로그아웃</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:20px">
        <div class="topbar-title" id="topbar-title">종합</div>
        <div id="topbar-kpi-bar" style="display:none;align-items:center;gap:16px">
          <div class="topbar-kpi-divider"></div>
          <div class="topbar-kpi-item"><span class="kpi-lbl">전체연번</span><span class="kpi-val" id="kpi-yeonbun">—</span></div>
          <div class="topbar-kpi-divider"></div>
          <div class="topbar-kpi-item"><span class="kpi-lbl">전체세대수</span><span class="kpi-val" id="kpi-sedae">—</span></div>
          <div class="topbar-kpi-divider"></div>
          <div class="topbar-kpi-item"><span class="kpi-lbl">전체소유자수</span><span class="kpi-val" id="kpi-owner">—</span></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-ghost btn-sm" id="topbar-refresh-btn" style="display:none" onclick="loadDashboardData()">🔄 새로고침</button>
        <div class="topbar-meta" id="topbar-meta"></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ══ 소유주 상세 모달 ══ -->
<div class="modal-overlay" id="owner-modal">
  <div class="modal" style="width:740px">
    <div class="modal-header">
      <div><div class="modal-title" id="modal-owner-name">—</div><div class="modal-sub" id="modal-owner-sub">—</div></div>
      <button class="modal-close" onclick="closeModal('owner-modal')">✕</button>
    </div>

const SUPABASE_URL = 'https://ldqoglrfvlugryhcmmve.supabase.co';

const _sb = (typeof supabase !== 'undefined' && supabase.createClient)

// ════════════════════════════════════════════════

let currentPage = 'dashboard';

// 소유주명부 필터 상태

// 차수 이름 헬퍼
function roundDisplayName(r) {
  const names = {1:'사전',2:'컨설팅',3:'선도지구',4:'주민대표단',5:'입안제안',6:'추진위원회'};
  if (names[r['차수']]) return names[r['차수']];
  return r['이름'] || r['차수']+'차';
}

// 전체 페이지네이션 조회
async function fetchAll(table, select, filters = []) {
  let rows = [], page = 0;
  while (page < 30) {
    let q = _sb.from(table).select(select).range(page * 1000, page * 1000 + 999);
    filters.forEach(([col, val]) => { q = q.eq(col, val); });
    const { data, error } = await q;
    if (error || !data || data.length === 0) break;
    rows = rows.concat(data);
    if (data.length < 1000) break;
    page++;
  }
  return rows;
}

function nowKST() {
  return new Date(Date.now() + 9*60*60*1000).toISOString().replace('Z','+09:00');
}
function fmtKST(ts, showTime=true) {
  if (!ts) return '—';
  const s = ts.replace('T',' ');
  const m = s.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})/);
  if (!m) return ts;
  return showTime ? `${m[1]}.${m[2]}.${m[3]} ${m[4]}:${m[5]}` : `${m[1]}.${m[2]}.${m[3]}`;
}

// ════════════════════════════════════════════════
// 인증
// ════════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  errEl.textContent = ''; btn.textContent = '로그인 중...'; btn.disabled = true;
  try {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    const { data: userRow } = await _sb.from('app_user').select('*').eq('username', data.user.email).single();
    if (!userRow) throw new Error('등록된 계정이 없습니다.');
    if (userRow.role !== '위원장') throw new Error('위원장 계정만 접속할 수 있습니다.');
    if (!userRow.is_active) throw new Error('비활성화된 계정입니다.');
    document.getElementById('user-name').textContent = userRow.name;
    document.getElementById('user-avatar').textContent = userRow.name.charAt(0);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    updateTopbarMeta();
    await navigate('dashboard');
  } catch(e) {
    errEl.textContent = e.message || '로그인 실패';
  } finally {
    btn.textContent = '로그인'; btn.disabled = false;
  }
}
async function doLogout() {
  await _sb.auth.signOut();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pw').value = '';
}
document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
_sb?.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return;
  const { data: userRow } = await _sb.from('app_user').select('*').eq('username', session.user.email).single();
  if (!userRow || userRow.role !== '위원장' || !userRow.is_active) return;
  document.getElementById('user-name').textContent = userRow.name;
  document.getElementById('user-avatar').textContent = userRow.name.charAt(0);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  updateTopbarMeta();
  await navigate('dashboard');
});

function openPasswordModal() {
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-confirm').value = '';
  document.getElementById('pw-err').textContent = '';
  openModal('password-modal');
}
async function savePassword() {
  const nw = document.getElementById('pw-new').value;
  const cf = document.getElementById('pw-confirm').value;
  const errEl = document.getElementById('pw-err');
  if (nw.length < 8) { errEl.textContent = '8자 이상 입력하세요.'; return; }
  if (nw !== cf) { errEl.textContent = '비밀번호가 일치하지 않습니다.'; return; }
  const { error } = await _sb.auth.updateUser({ password: nw });
  if (error) { errEl.textContent = '변경 실패: ' + error.message; return; }
  closeModal('password-modal');
  showToast('비밀번호가 변경되었습니다.', 'success');
}

// ════════════════════════════════════════════════
// 네비게이션
// ════════════════════════════════════════════════
const pageTitles = { dashboard:'종합', owners:'소유주명부', payment:'운영경비', activity:'활동기록', settings:'설정' };
async function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('topbar-title').textContent = pageTitles[page];
  const kpiBar = document.getElementById('topbar-kpi-bar');
  const refreshBtn = document.getElementById('topbar-refresh-btn');
  kpiBar.style.display = page === 'dashboard' ? 'flex' : 'none';
  refreshBtn.style.display = page === 'dashboard' ? 'inline-flex' : 'none';
  document.getElementById('content').innerHTML = '<div class="loading-center"><div class="spinner"></div> 불러오는 중...</div>';
  if (page === 'dashboard') await renderDashboard();
  else if (page === 'owners') await renderOwners();
  else if (page === 'payment') await renderPayment();
  else if (page === 'activity') await renderActivity();
  else if (page === 'settings') await renderSettings();
}
function updateTopbarMeta() {
  const now = new Date();
  document.getElementById('topbar-meta').textContent =
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}) + ' ' +
    now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

// ════════════════════════════════════════════════
// 대시보드
// ════════════════════════════════════════════════
async function renderDashboard() {
  const content = document.getElementById('content');
  const { data: rounds } = await _sb.from('consent_round').select('*').order('차수');
  consentRounds = rounds || [];
  const defaultRound = consentRounds.length ? consentRounds[consentRounds.length-1]['차수'] : 1;
  const [{ count: yeonbunTotal },{ count: sedaeTotal }] = await Promise.all([
    _sb.from('yeonbun').select('*',{count:'exact',head:true}).eq('is_active',true),
    _sb.from('property').select('*',{count:'exact',head:true}),
  ]);
  // 현재 소유자 수 — is_current=true 기준 중복 제거
  // 현재 소유자 수 — 전체 owner_id 페이지네이션으로 가져와 중복 제거
  let _ownerSet = new Set(), _ownerFrom = 0;
  while(true) {
    const {data:_chunk} = await _sb.from('registration').select('owner_id').eq('is_current',true).range(_ownerFrom, _ownerFrom+999);
    if(!_chunk||!_chunk.length) break;
    _chunk.forEach(r=>{ if(r.owner_id) _ownerSet.add(r.owner_id); });
    if(_chunk.length < 1000) break;
    _ownerFrom += 1000;
  }
  const ownerTotal = _ownerSet.size;
  document.getElementById('kpi-yeonbun').textContent = (yeonbunTotal||0).toLocaleString();
  document.getElementById('kpi-sedae').textContent = (sedaeTotal||0).toLocaleString();
  document.getElementById('kpi-owner').textContent = (ownerTotal||0).toLocaleString();
  content.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <label style="font-size:13px;color:var(--text2)">동의 차수 선택</label>
      <select class="input" id="round-select" onchange="loadDashboardData()" style="min-width:160px">
        ${consentRounds.map(r=>`<option value="${r['차수']}" ${r['차수']==defaultRound?'selected':''}>${r['차수']}차 — ${roundDisplayName(r)}</option>`).join('')}
      </select>
    </div>
    <div id="dash-body"><div class="loading-center"><div class="spinner"></div> 집계 중...</div></div>`;
  await loadDashboardData();
}
async function loadDashboardData() {
  const roundNo = parseInt(document.getElementById('round-select').value);
  currentRoundNo = roundNo;
  const roundInfo = consentRounds.find(r=>r['차수']===roundNo);
  const dashBody = document.getElementById('dash-body');
  dashBody.innerHTML = '<div class="loading-center"><div class="spinner"></div> 집계 중...</div>';
  try {
    const [{ count: totalYeonbun },{ count: submittedCount },{ count: opposedCount }] = await Promise.all([
      _sb.from('yeonbun').select('*',{count:'exact',head:true}).eq('is_active',true),
      _sb.from('consent').select('*',{count:'exact',head:true}).eq('차수',roundNo).eq('상태','제출'),
      _sb.from('consent').select('*',{count:'exact',head:true}).eq('차수',roundNo).eq('상태','반대')
    ]);
    const finalSubmitted = submittedCount||0;
    const finalOpposed = opposedCount||0;
    const rate = totalYeonbun ? (finalSubmitted/totalYeonbun*100).toFixed(2) : 0;
    const notSubmitted = (totalYeonbun||0) - finalSubmitted - finalOpposed;

    const [allYeonbun, allProps, allYP, submittedList] = await Promise.all([
      fetchAll('yeonbun','연번',[['is_active',true]]),
      fetchAll('property','부동산코드,단지,부동산유형',[]),
      fetchAll('registration','연번,부동산코드',[]),
      fetchAll('consent','연번',[['차수',roundNo],['상태','제출']])
    ]);
    const activeSet = new Set(allYeonbun.map(y=>y['연번']));
    const submittedSet = new Set(submittedList.map(c=>c['연번']));
    const SANGGA_TYPES = new Set(['상가동','분산상가','백마상가','설촌상가']);
    const codeToD={}, codeToType={};
    allProps.forEach(p=>{ codeToD[p['부동산코드']]=p['단지']; codeToType[p['부동산코드']]=p['부동산유형']||''; });
    const yeonbunToDanji={};
    allYP.forEach(yp=>{ const y=yp['연번'],code=yp['부동산코드']; const label=SANGGA_TYPES.has(codeToType[code])?'상가동':codeToD[code]; if(!label)return; if(!yeonbunToDanji[y])yeonbunToDanji[y]=new Set(); yeonbunToDanji[y].add(label); });
    const danjiList=['3단지','4단지','5단지','6단지','상가동'];
    const danjiYeonbunMap={}; danjiList.forEach(d=>{danjiYeonbunMap[d]=new Set();});
    activeSet.forEach(y=>{ (yeonbunToDanji[y]||new Set()).forEach(d=>{ if(danjiYeonbunMap[d])danjiYeonbunMap[d].add(y); }); });
    const danjiStats = danjiList.map(danji=>{ const ySet=danjiYeonbunMap[danji]; let submitted=0; ySet.forEach(y=>{ if(submittedSet.has(y))submitted++; }); return {danji,total:ySet.size,submitted}; });

    dashBody.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card highlight"><div class="stat-label">전체 동의율</div><div class="stat-value">${rate}<small style="font-size:16px">%</small></div><div class="stat-sub">${roundInfo?roundDisplayName(roundInfo):roundNo+'차'} 기준</div></div>
        <div class="stat-card"><div class="stat-label">제출 완료</div><div class="stat-value" style="color:var(--green)">${finalSubmitted.toLocaleString()}</div><div class="stat-sub">연번 기준</div></div>
        <div class="stat-card"><div class="stat-label">미제출</div><div class="stat-value" style="color:var(--yellow)">${notSubmitted.toLocaleString()}</div><div class="stat-sub">연번 기준</div></div>
        <div class="stat-card"><div class="stat-label">반대</div><div class="stat-value" style="color:var(--red)">${finalOpposed.toLocaleString()}</div><div class="stat-sub">전체 ${totalYeonbun?.toLocaleString()} 연번</div></div>
      </div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">전체 동의 진행률</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${roundInfo?roundInfo['차수']+'차 — '+roundDisplayName(roundInfo):''}</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${rate}%"></div></div>
        <div class="progress-label"><span>${finalSubmitted.toLocaleString()} / ${totalYeonbun?.toLocaleString()} 연번</span><span style="color:var(--accent);font-weight:700">${rate}%</span></div>
      </div>
      <div class="section-title">단지별 동의 현황 <span style="font-size:12px;font-weight:400;color:var(--text3)">— 카드 클릭 시 동별 현황</span></div>
      <div class="danji-grid">
        ${danjiStats.map(d=>{ const r=d.total?(d.submitted/d.total*100).toFixed(1):0; return `<div class="danji-card" onclick="openDanjiModal('${d.danji}',${currentRoundNo})"><div class="danji-name">${d.danji}</div><div class="danji-rate">${r}<span>%</span></div><div class="danji-detail">${d.submitted.toLocaleString()} / ${d.total.toLocaleString()} 연번</div><div class="danji-bar"><div class="danji-bar-fill" style="width:${r}%"></div></div></div>`; }).join('')}
      </div>`;
  } catch(e) {
    dashBody.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

// ════════════════════════════════════════════════
// 단지별 동별 팝업
// ════════════════════════════════════════════════
async function openDanjiModal(danji, roundNo) {
  document.getElementById('danji-modal-title').textContent = danji + ' 동의 현황';
  const roundInfo = consentRounds.find(r=>r['차수']===roundNo);
  document.getElementById('danji-modal-sub').textContent = `${roundNo}차 — ${roundInfo?roundDisplayName(roundInfo):''} 기준`;
  openModal('danji-modal');
  const body = document.getElementById('danji-modal-body');
  body.innerHTML = '<div class="loading-center"><div class="spinner"></div> 집계 중...</div>';
  try {
    const isSangga = danji === '상가동';
    const SANGGA_TYPES = ['상가동','분산상가','백마상가','설촌상가'];
    let allProps = [];
    if (isSangga) {
      for (const ptype of SANGGA_TYPES) {
        let from=0;
        while(true){ const {data:chunk}=await _sb.from('property').select('부동산코드,동,단지,부동산유형').eq('부동산유형',ptype).range(from,from+999); if(!chunk||chunk.length===0)break; allProps=allProps.concat(chunk); if(chunk.length<1000)break; from+=1000; }
      }
    } else {
      let from=0;
      while(true){ const {data:chunk}=await _sb.from('property').select('부동산코드,동,단지,부동산유형').eq('단지',danji).range(from,from+999); if(!chunk||chunk.length===0)break; allProps=allProps.concat(chunk.filter(p=>/^\d+$/.test(p['동']))); if(chunk.length<1000)break; from+=1000; }
    }
    if(allProps.length===0){body.innerHTML='<div class="empty-state"><p>데이터가 없습니다.</p></div>';return;}
    const codeToGroup={};
    allProps.forEach(p=>{ let g; if(isSangga){if(p['부동산유형']==='백마상가')g='백마상가'; else if(p['부동산유형']==='설촌상가')g='설촌상가'; else g=p['단지']+' '+p['부동산유형'];} else{g=p['동'];} codeToGroup[p['부동산코드']]=g; });
    const groupSet=new Set(Object.values(codeToGroup));
    const groupList=[...groupSet].sort((a,b)=>{const an=parseInt(a),bn=parseInt(b); if(!isNaN(an)&&!isNaN(bn))return an-bn; return a.localeCompare(b,'ko');});
    const allCodes=allProps.map(p=>p['부동산코드']);
    let allYP=[];
    for(let i=0;i<allCodes.length;i+=500){const {data}=await _sb.from('registration').select('연번,부동산코드').in('부동산코드',allCodes.slice(i,i+500)); if(data)allYP=allYP.concat(data);}
    let activeYeonbuns=new Set();
    let from=0; while(true){const {data:chunk}=await _sb.from('yeonbun').select('연번').eq('is_active',true).range(from,from+999); if(!chunk||chunk.length===0)break; chunk.forEach(y=>activeYeonbuns.add(y['연번'])); if(chunk.length<1000)break; from+=1000;}
    let submittedSet=new Set();
    from=0; while(true){const {data:chunk}=await _sb.from('consent').select('연번').eq('차수',roundNo).eq('상태','제출').range(from,from+999); if(!chunk||chunk.length===0)break; chunk.forEach(c=>submittedSet.add(c['연번'])); if(chunk.length<1000)break; from+=1000;}
    const yeonbunToGroup={};
    allYP.forEach(yp=>{ const y=yp['연번'],g=codeToGroup[yp['부동산코드']]; if(!g)return; if(!yeonbunToGroup[y])yeonbunToGroup[y]=new Set(); yeonbunToGroup[y].add(g); });
    const groupStats=groupList.map(group=>{ let total=0,submitted=0; Object.entries(yeonbunToGroup).forEach(([y,gSet])=>{ const yn=parseInt(y); if(!activeYeonbuns.has(yn))return; if(gSet.has(group)){total++; if(submittedSet.has(yn))submitted++;} }); return{group,total,submitted}; }).filter(d=>d.total>0);
    if(!groupStats.length){body.innerHTML='<div class="empty-state"><p>집계 데이터가 없습니다.</p></div>';return;}
    const totalAll=groupStats.reduce((s,d)=>s+d.total,0);
    const submittedAll=groupStats.reduce((s,d)=>s+d.submitted,0);
    const rateAll=totalAll?(submittedAll/totalAll*100).toFixed(1):0;
    const groupLabel=isSangga?'상가':'동';
    body.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:12px 16px;background:var(--accent-soft);border-radius:8px;border:1px solid var(--accent)">
        <span style="font-size:13px;font-weight:600;color:var(--accent)">${danji} 전체</span>
        <span style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent)">${rateAll}%</span>
        <span style="font-size:12px;color:var(--text3)">${submittedAll.toLocaleString()} / ${totalAll.toLocaleString()} 연번</span>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>${groupLabel}</th><th>전체연번</th><th>제출</th><th>미제출</th><th>동의율</th></tr></thead>
        <tbody>${groupStats.map(d=>{ const r=d.total?(d.submitted/d.total*100).toFixed(1):0; const color=r>=75?'var(--green)':r>=50?'var(--accent)':r>=25?'var(--yellow)':'var(--red)'; const label=isSangga?d.group:d.group+'동'; return `<tr><td><strong>${label}</strong></td><td class="mono">${d.total.toLocaleString()}</td><td class="mono" style="color:var(--green)">${d.submitted.toLocaleString()}</td><td class="mono" style="color:var(--yellow)">${(d.total-d.submitted).toLocaleString()}</td><td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;min-width:80px;overflow:hidden"><div style="height:100%;width:${r}%;background:${color};border-radius:3px"></div></div><span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${color};min-width:42px">${r}%</span></div></td></tr>`; }).join('')}</tbody></table>
      </div>`;
  } catch(e){body.innerHTML=`<div class="empty-state"><p>오류: ${e.message}</p></div>`;}
}

// ════════════════════════════════════════════════
// 소유주명부 (동의관리 통합)
// ════════════════════════════════════════════════
async function renderOwners() {
  if(!consentRounds.length){const {data:rounds}=await _sb.from('consent_round').select('*').order('차수'); consentRounds=rounds||[];}

  // 최상단 KPI 조회: 전체연번 / 전체세대수 / 전체소유자수 / 얼마집인증자수
  const [{count:ownKpiYeonbun},{count:ownKpiSedae}] = await Promise.all([
    _sb.from('yeonbun').select('*',{count:'exact',head:true}).eq('is_active',true),
    _sb.from('property').select('*',{count:'exact',head:true}),
  ]);
  // 현재 소유자 수 — is_current=true 기준 owner_id 중복 제거 (구 소유자 제외)
  // 현재 소유자 수 — 전체 owner_id 페이지네이션으로 가져와 중복 제거
  let _ownSet = new Set(), _ownFrom = 0;
  while(true) {
    const {data:_ownChunk} = await _sb.from('registration').select('owner_id').eq('is_current',true).range(_ownFrom, _ownFrom+999);
    if(!_ownChunk||!_ownChunk.length) break;
    _ownChunk.forEach(r=>{ if(r.owner_id) _ownSet.add(r.owner_id); });
    if(_ownChunk.length < 1000) break;
    _ownFrom += 1000;
  }
  const ownKpiOwner = _ownSet.size;
  // 얼마집 인증자 수 — 사람 기준 중복 제거 (같은 사람이 여러 부동산 인증해도 1명)
  // 얼마집 인증자 수 — 페이지네이션으로 전체 가져와 중복 제거
  let _certSet = new Set(), _certFrom = 0;
  while(true) {
    const {data:_certChunk} = await _sb.from('registration').select('owner_id').eq('얼마집_인증','O').eq('is_current',true).range(_certFrom, _certFrom+999);
    if(!_certChunk||!_certChunk.length) break;
    _certChunk.forEach(r=>{ if(r.owner_id) _certSet.add(r.owner_id); });
    if(_certChunk.length < 1000) break;
    _certFrom += 1000;
  }
  const ownKpiCert = _certSet.size;

  // 단지/동 목록
  const {data:danjiList}=await _sb.from('property').select('단지').limit(2000);
  const danjiSet=new Set((danjiList||[]).map(p=>p['단지']).filter(Boolean));
  const danjiArr=[...danjiSet].sort();

  const html=`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">전체 연번</div><div class="stat-value" style="color:var(--accent)">${(ownKpiYeonbun||0).toLocaleString()}</div><div class="stat-sub">동의 집계 단위</div></div>
      <div class="stat-card"><div class="stat-label">전체 세대수</div><div class="stat-value" style="color:var(--text)">${(ownKpiSedae||0).toLocaleString()}</div><div class="stat-sub">등록 부동산 수</div></div>
      <div class="stat-card"><div class="stat-label">전체 소유자수</div><div class="stat-value" style="color:var(--text)">${(ownKpiOwner||0).toLocaleString()}</div><div class="stat-sub">owner 테이블 기준</div></div>
      <div class="stat-card" style="border-color:var(--green)"><div class="stat-label">얼마집 인증자</div><div class="stat-value" style="color:var(--green)">${(ownKpiCert||0).toLocaleString()}</div><div class="stat-sub">전체 ${(ownKpiOwner||0).toLocaleString()}명 중</div></div>
    </div>
    <div class="filter-panel">
      <!-- 보기 방식 -->
      <div class="filter-row">
        <span class="filter-label">보기 방식</span>
        <div class="view-toggle">
          <button id="vt-property" class="on" onclick="setOwnerView('property')">부동산ID 기준</button>
          <button id="vt-yeonbun" onclick="setOwnerView('yeonbun')">연번 기준</button>
        </div>
      </div>
      <!-- 검색 -->
      <div class="filter-row">
        <span class="filter-label">검색</span>
        <div class="chip-group" id="search-type-chips">
          ${['전체','연번','부동산ID','이름','전화번호'].map(t=>`<span class="chip ${t==='전체'?'on':''}" onclick="setOwnerSearchType('${t}')">${t}</span>`).join('')}
        </div>
        <div style="display:flex;gap:8px;flex:1;min-width:240px">
          <input class="input" id="owner-search-input" placeholder="검색어 입력 후 Enter" style="flex:1" onkeydown="if(event.key==='Enter')doOwnerSearch()">
          <button class="btn btn-blue" onclick="doOwnerSearch()">🔍 검색</button>
          <button class="btn btn-ghost" onclick="resetOwnerSearch()">초기화</button>
        </div>
      </div>
      <!-- 드롭다운 필터 -->
      <div class="filter-row">
        <span class="filter-label">단지 / 동</span>
        <select class="input" id="filter-danji" onchange="onDanjiChange()" style="min-width:120px">
          <option value="">전체 단지</option>
          ${danjiArr.map(d=>`<option value="${d}">${d}</option>`).join('')}
          <option value="상가동">상가동</option>
        </select>
        <select class="input" id="filter-dong" style="min-width:100px" onchange="ownerFilters.dong=this.value;doOwnerSearch()">
          <option value="">전체 동</option>
        </select>
      </div>
      <!-- 체크 필터: 거주구분 -->
      <div class="filter-row">
        <span class="filter-label">거주구분</span>
        <div class="chip-group">
          ${['내부','외부','알수없음'].map(v=>`<span class="chip" id="chk-res-${v}" onclick="toggleChipFilter('거주구분','${v}',this)">${v}</span>`).join('')}
        </div>
      </div>
      <!-- 체크 필터: 동의서 제출여부 -->
      <div class="filter-row">
        <span class="filter-label">동의서 제출</span>
        <div class="chip-group">
          ${[1,2,3,4,5,6].map(n=>`<span class="chip" id="chk-consent-${n}" onclick="toggleConsentFilter(${n},this)">${n}차 제출</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="result-count" id="owner-result-count"></div>
    <div id="owner-list"><div class="loading-center"><div class="spinner"></div> 불러오는 중...</div></div>
  `;
  document.getElementById('content').innerHTML = html;
  ownerView = 'property';
  ownerSearchType = '전체';
  ownerFilters = { danji:'', dong:'', 거주구분:[], consent:{} };
  await doOwnerSearch();
}

function setOwnerView(v) {
  ownerView = v;
  document.getElementById('vt-property').classList.toggle('on', v==='property');
  document.getElementById('vt-yeonbun').classList.toggle('on', v==='yeonbun');
  doOwnerSearch();
}

function setOwnerSearchType(t) {
  ownerSearchType = t;
  document.querySelectorAll('#search-type-chips .chip').forEach(c => { c.classList.toggle('on', c.textContent.trim()===t); });
}

function toggleChipFilter(field, value, el) {
  const arr = ownerFilters[field];
  const idx = arr.indexOf(value);
  if (idx >= 0) { arr.splice(idx,1); el.classList.remove('on','green-on','red-on'); }
  else { arr.push(value); el.classList.add('on'); }
  doOwnerSearch();
}

function toggleConsentFilter(n, el) {
  if (ownerFilters.consent[n]) { delete ownerFilters.consent[n]; el.classList.remove('on','green-on'); }
  else { ownerFilters.consent[n] = true; el.classList.add('on','green-on'); }
  doOwnerSearch();
}

async function onDanjiChange() {
  const danji = document.getElementById('filter-danji').value;
  ownerFilters.danji = danji;
  ownerFilters.dong = '';
  // 동 목록 로드
  const dongSel = document.getElementById('filter-dong');
  dongSel.innerHTML = '<option value="">전체 동</option>';
  if (danji) {
    const {data} = await _sb.from('property').select('동').eq('단지', danji).limit(1000);
    const dongSet = new Set((data||[]).map(p=>p['동']).filter(Boolean));
    [...dongSet].sort((a,b)=>{const an=parseInt(a),bn=parseInt(b);return isNaN(an)||isNaN(bn)?a.localeCompare(b,'ko'):an-bn;}).forEach(d=>{
      const o=document.createElement('option'); o.value=d; o.textContent=d; dongSel.appendChild(o);
    });
  }
  doOwnerSearch();
}

function resetOwnerSearch() {
  document.getElementById('owner-search-input').value = '';
  ownerFilters = { danji:'', dong:'', 거주구분:[], consent:{} };
  document.getElementById('filter-danji').value = '';
  document.getElementById('filter-dong').innerHTML = '<option value="">전체 동</option>';
  document.querySelectorAll('.filter-panel .chip').forEach(c=>{ c.classList.remove('on','green-on','red-on'); });
  document.querySelectorAll('#search-type-chips .chip').forEach((c,i)=>{ c.classList.toggle('on', i===0); });
  ownerSearchType='전체';
  doOwnerSearch();
}

// 전체 검색 결과 보관 (페이지네이션용)
let ownerAllRows = [];
let ownerCurrentPage = 1;
const OWNER_PAGE_SIZE = 50;

async function doOwnerSearch(resetPage = true) {
  const listEl = document.getElementById('owner-list');
  const countEl = document.getElementById('owner-result-count');
  if(!listEl) return;
  if(resetPage) ownerCurrentPage = 1;
  listEl.innerHTML = '<div class="loading-center"><div class="spinner"></div> 검색 중...</div>';

  try {
    const keyword = document.getElementById('owner-search-input')?.value.trim() || '';

    let rows = [];

    // ── 단지 필터가 있으면 부동산코드 기준으로 먼저 조회 ──
    if (ownerFilters.danji) {
      // 1) 해당 단지의 부동산코드 목록 조회
      let propQ = _sb.from('property').select('부동산코드,단지,동,호,부동산유형');
      if (ownerFilters.danji === '상가동') {
        // 상가는 부동산유형으로 필터
        const SANGGA_TYPES = ['상가동','분산상가','백마상가','설촌상가'];
        // OR 조건: Supabase에서 in() 사용
        propQ = _sb.from('property').select('부동산코드,단지,동,호,부동산유형').in('부동산유형', SANGGA_TYPES);
      } else {
        propQ = propQ.eq('단지', ownerFilters.danji);
        if (ownerFilters.dong) propQ = propQ.eq('동', ownerFilters.dong);
      }
      // 페이지네이션으로 전체 로드
      let propCodes = [];
      let propFrom = 0;
      while(true) {
        const {data:chunk} = await propQ.range(propFrom, propFrom+999);
        if(!chunk||chunk.length===0) break;
        propCodes = propCodes.concat(chunk.map(p=>p['부동산코드']));
        if(chunk.length < 1000) break;
        propFrom += 1000;
      }
      if(propCodes.length === 0) {
        ownerAllRows = [];
        countEl.textContent = '검색 결과: 0건';
        renderOwnerTable([]);
        return;
      }
      // 2) 해당 부동산코드의 registration 전체 조회 (500개씩 청크)
      for(let i=0; i<propCodes.length; i+=500) {
        const chunk = propCodes.slice(i, i+500);
        let q = _sb.from('registration')
          .select('연번,부번,대표소유주,소유형태,거주구분,owner_id,owner:owner_id(id,이름,전화번호),property:부동산코드(부동산코드,단지,동,호,부동산유형)')
          .in('부동산코드', chunk)
          .order('부동산코드', {ascending:true});
        const {data} = await q;
        if(data) rows = rows.concat(data);
      }
    } else {
      // 단지 미선택 — 키워드 또는 전체 조회
      if (keyword && (ownerSearchType==='이름'||ownerSearchType==='전화번호')) {
        let ownerQuery = _sb.from('owner').select('id,이름,전화번호').limit(300);
        if (ownerSearchType==='이름') ownerQuery=ownerQuery.ilike('이름',`%${keyword}%`);
        else ownerQuery=ownerQuery.ilike('전화번호',`%${keyword}%`);
        const {data:oRows}=await ownerQuery;
        if(oRows&&oRows.length>0){
          for(const o of oRows){
            const {data:yo}=await _sb.from('registration')
              .select('연번,부번,대표소유주,소유형태,거주구분,property:부동산코드(부동산코드,단지,동,호,부동산유형)')
              .eq('owner_id',o.id);
            if(yo) yo.forEach(y=>rows.push({...y,owner:o}));
          }
        }
      } else {
        // 연번/부동산ID 검색 또는 전체
        let q = _sb.from('registration')
          .select('연번,부번,대표소유주,소유형태,거주구분,owner:owner_id(id,이름,전화번호),property:부동산코드(부동산코드,단지,동,호,부동산유형)')
          .order('연번',{ascending:true});
        if (keyword && ownerSearchType==='연번' && /^\d+$/.test(keyword)) {
          q = q.eq('연번', parseInt(keyword));
          const {data} = await q;
          rows = data || [];
        } else if (keyword && ownerSearchType==='부동산ID') {
          q = q.ilike('부동산코드', `%${keyword}%`);
          const {data} = await q;
          rows = data || [];
        } else {
          // 전체 조회 — 1000건씩 페이지네이션으로 전부 로드
          let from = 0;
          while(true) {
            const {data:chunk} = await q.range(from, from+999);
            if(!chunk||chunk.length===0) break;
            rows = rows.concat(chunk);
            if(chunk.length < 1000) break;
            from += 1000;
          }
        }
      }
      // 동 필터 (단지 없이 동만 있는 경우 대비)
      if (ownerFilters.dong) rows = rows.filter(r=>r.property?.동===ownerFilters.dong);
    }

    // 거주구분 필터
    if (ownerFilters.거주구분.length) rows=rows.filter(r=>ownerFilters.거주구분.includes(r['거주구분']));

    // 동의서 차수 필터
    const consentFilterKeys = Object.keys(ownerFilters.consent).map(Number).filter(n=>ownerFilters.consent[n]);
    if (consentFilterKeys.length > 0) {
      const ynNums=[...new Set(rows.map(r=>r['연번']))];
      if(ynNums.length>0){
        let consentData=[];
        for(let i=0;i<ynNums.length;i+=500){
          const {data}=await _sb.from('consent').select('연번,차수,상태').in('연번',ynNums.slice(i,i+500)).in('차수',consentFilterKeys);
          if(data)consentData=consentData.concat(data);
        }
        const consentMap={};
        consentData.forEach(c=>{ if(!consentMap[c['연번']])consentMap[c['연번']]=[]; consentMap[c['연번']].push(c); });
        rows=rows.filter(r=>{
          const cs=consentMap[r['연번']]||[];
          return consentFilterKeys.every(n=>cs.some(c=>c['차수']===n&&c['상태']==='제출'));
        });
      } else { rows=[]; }
    }

    // 중복 제거
    const seen=new Set(), unique=[];
    rows.forEach(r=>{ const k=`${r['연번']}-${r.property?.부동산코드||''}-${r.owner?.id||''}`; if(!seen.has(k)){seen.add(k);unique.push(r);} });

    ownerAllRows = unique;
    countEl.textContent = `전체 ${unique.length.toLocaleString()}건`;
    renderOwnerTablePage();
  } catch(e) {
    listEl.innerHTML = `<div class="empty-state"><p>오류: ${e.message}</p></div>`;
    console.error(e);
  }
}

function renderOwnerTablePage() {
  const total = ownerAllRows.length;
  const totalPages = Math.ceil(total / OWNER_PAGE_SIZE);
  const start = (ownerCurrentPage-1)*OWNER_PAGE_SIZE;
  const pageRows = ownerAllRows.slice(start, start+OWNER_PAGE_SIZE);
  const countEl = document.getElementById('owner-result-count');
  if(countEl) countEl.textContent = `전체 ${total.toLocaleString()}건 (${ownerCurrentPage}/${totalPages||1} 페이지, 페이지당 ${OWNER_PAGE_SIZE}건)`;
  renderOwnerTable(pageRows, total, totalPages);
}

function goOwnerPage(p) {

}

// 동의서 빠른 수정 (명부 테이블에서 직접 클릭)
function quickConsentEdit(yeonbun, round, roundName, status, method) {

}

// 인라인 수정 — 더블클릭 시 input으로 전환
async function startInlineEdit(el, field, ownerId, yeonbun, pidOrOwnerId) {
  // field='거주구분': registration 업데이트(연번+부동산코드), field='전화번호': owner 업데이트
  const resolvedId = field==='거주구분' ? pidOrOwnerId : ownerId;
  if(!resolvedId||resolvedId==='undefined'||resolvedId==='null'){showToast('ID를 찾을 수 없습니다.','error');return;}
  const orig = el.textContent.trim();
  const td = el.parentElement;

  let inputEl;
  if(field==='거주구분'){
    inputEl = document.createElement('select');
    inputEl.className = 'input';
    inputEl.style.cssText='padding:3px 6px;font-size:12px;height:28px;width:90px';
    ['내부','외부','알수없음','—'].forEach(v=>{ const o=document.createElement('option'); o.value=v==='—'?'':v; o.textContent=v; if(v===orig)o.selected=true; inputEl.appendChild(o); });
  } else {
    inputEl = document.createElement('input');
    inputEl.className = 'input';
    inputEl.value = orig === '—' ? '' : orig;
    inputEl.style.cssText='padding:3px 6px;font-size:12px;height:28px;width:140px';
  }

  td.innerHTML = '';
  td.appendChild(inputEl);

  const save = async () => {
    const newVal = inputEl.value.trim() || null;
    let saveError;
    if(field==='거주구분') {
      let q = _sb.from('registration').update({거주구분: newVal}).eq('연번', parseInt(yeonbun||0)).eq('부동산코드', resolvedId);
      if(ownerId && ownerId!=='undefined') q = q.eq('owner_id', ownerId);
      ({error:saveError} = await q);
    } else {
      ({error:saveError} = await _sb.from('owner').update({전화번호: newVal}).eq('id', resolvedId));
    }
    if(saveError){ showToast('저장 실패: '+saveError.message,'error'); td.innerHTML=`<span ondblclick="startInlineEdit(this,'${field}','${ownerId}','${yeonbun}','${resolvedId}')" title="더블클릭으로 수정">${orig}</span>`; return; }
    showToast(`${field} 저장 완료`,'success');
    td.innerHTML=`<span ondblclick="startInlineEdit(this,'${field}','${ownerId}','${yeonbun}','${resolvedId}')" title="더블클릭으로 수정">${newVal||'—'}</span>`;
  };

  inputEl.addEventListener('blur', save);
  inputEl.addEventListener('keydown', e=>{
    if(e.key==='Enter') { e.preventDefault(); inputEl.blur(); }
    if(e.key==='Escape') { td.innerHTML=`<span ondblclick="startInlineEdit(this,'${field}','${ownerId}','${yeonbun}','${resolvedId}')" title="더블클릭으로 수정">${orig}</span>`; }
  });
  inputEl.focus();
  if(inputEl.tagName==='INPUT') inputEl.select();
}

async function openOwnerModal(ownerId, yeonbun) {
  currentOwnerData = { ownerId, yeonbun };
  currentModalTab = 0;
  updateModalTabs();
  openModal('owner-modal');
  document.getElementById('modal-owner-name').textContent = '불러오는 중...';
  document.getElementById('modal-owner-sub').textContent = '';
  await loadModalTab(0);
}
function updateModalTabs() {
  ['mtab-0','mtab-1','mtab-2','mtab-3'].forEach((id,i)=>{ document.getElementById(id).classList.toggle('active',i===currentModalTab); });
}
async function switchModalTab(idx) { currentModalTab=idx; updateModalTabs(); await loadModalTab(idx); }
async function loadModalTab(idx) {
  const body=document.getElementById('modal-body');
  body.innerHTML='<div class="loading-center"><div class="spinner"></div> 불러오는 중...</div>';
  const {ownerId,yeonbun}=currentOwnerData;
  if(idx===0) await loadOwnerBasicTab(ownerId,yeonbun,body);
  else if(idx===1) await loadOwnerConsentTab(yeonbun,body);
  else if(idx===2) await loadOwnerPaymentTab(yeonbun,body);
  else if(idx===3) await loadOwnerActivityTab(yeonbun,ownerId,body);
}

let payTabCurrent = 'list';
let payRoundsGlobal = [];

async function loadPaySummary(){
  const summaryEl = document.getElementById('pay-summary');
  try {
    const [allPay, allYeonbun] = await Promise.all([
      fetchAll('payment','연번,금액,회차,is_previous_owner',[]),
      fetchAll('yeonbun','연번',[['is_active',true]])
    ]);
    const {data:payRounds}=await _sb.from('payment_round').select('*').order('회차');
    payRoundsGlobal = payRounds||[];
    const totalYeonbun = allYeonbun.length;

    // 현재 소유주 납부만 기준으로 집계 (이전 소유주 납부 제외)
    const currentPay = allPay.filter(p=>!p['is_previous_owner']);
    const totalAmount = currentPay.reduce((s,p)=>s+(p['금액']||0),0);
    const paidSet = new Set(currentPay.map(p=>p['연번']));
    const paidCount = paidSet.size;
    const paidRate = totalYeonbun?(paidCount/totalYeonbun*100).toFixed(1):0;

    // 이전 소유주 납부 합계 (참고용)
    const prevTotal = allPay.filter(p=>p['is_previous_owner']).reduce((s,p)=>s+(p['금액']||0),0);

    // 회차별 합계 (현재 소유주만)
    const roundAmtMap={};
    currentPay.forEach(p=>{ roundAmtMap[p['회차']]=(roundAmtMap[p['회차']]||0)+(p['금액']||0); });

    // 단지별 집계
    const [allYP,allProps]=await Promise.all([
      fetchAll('registration','연번,부동산코드',[]),
      fetchAll('property','부동산코드,단지',[])
    ]);
    const codeToD={};
    allProps.forEach(p=>{codeToD[p['부동산코드']]=p['단지'];});
    const ynToDanji={};
    allYP.forEach(yp=>{if(!ynToDanji[yp['연번']])ynToDanji[yp['연번']]=new Set(); ynToDanji[yp['연번']].add(codeToD[yp['부동산코드']]);});
    const danjiList=['3단지','4단지','5단지','6단지','상가동'];
    const danjiAmtMap={};
    danjiList.forEach(d=>{danjiAmtMap[d]=0;});
    allPay.forEach(p=>{
      const ds=ynToDanji[p['연번']]; if(!ds)return;
      ds.forEach(d=>{if(danjiAmtMap[d]!==undefined)danjiAmtMap[d]+=(p['금액']||0)/ds.size;});
    });

    summaryEl.innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
        <div class="stat-card highlight"><div class="stat-label">납부율</div><div class="stat-value">${paidRate}<small style="font-size:16px">%</small></div><div class="stat-sub">현재 소유주 기준</div></div>
        <div class="stat-card"><div class="stat-label">총 수납액 (현재 소유주)</div><div class="stat-value" style="font-size:20px;color:var(--accent)">${totalAmount.toLocaleString()}</div><div class="stat-sub">원${prevTotal>0?` &nbsp;|&nbsp; 이전 소유주 ${prevTotal.toLocaleString()}원 별도`:''}</div></div>
        <div class="stat-card"><div class="stat-label">납부 완료 (납부자 수)</div><div class="stat-value" style="color:var(--green)">${paidCount.toLocaleString()}</div><div class="stat-sub">/ ${totalYeonbun.toLocaleString()} 연번</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">
        <div class="card">
          <div class="card-title">회차별 입금액</div>
          ${(payRoundsGlobal.length?payRoundsGlobal:[{회차:1,이름:'1차 납부'}]).map(r=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:13px">${r['이름']||r['회차']+'회차'}</span>
              <span style="font-family:var(--mono);font-weight:600;color:var(--accent)">${(roundAmtMap[r['회차']]||0).toLocaleString()}원</span>
            </div>`).join('')}
        </div>
        <div class="card">
          <div class="card-title">단지별 입금액 (추정)</div>
          ${danjiList.map(d=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:13px">${d}</span>
              <span style="font-family:var(--mono);font-weight:600;color:var(--accent)">${Math.round(danjiAmtMap[d]).toLocaleString()}원</span>
            </div>`).join('')}
        </div>
      </div>`;
  } catch(e){summaryEl.innerHTML=`<div class="empty-state"><p>집계 오류: ${e.message}</p></div>`;}
}

      </select>
      <select class="input" id="pay-status-filter" style="min-width:110px" onchange="loadPayList()">
        <option value="">전체</option><option value="납부">납부 완료</option><option value="미납">미납</option>
      </select>

      <button class="btn btn-blue" onclick="loadPayList()">🔍 조회</button>
    </div>
    <div class="result-count" id="pay-result-count"></div>
    <div id="pay-list"><div class="loading-center"><div class="spinner"></div> 불러오는 중...</div></div>`;
  await loadPayList();
}

async function loadPayList() {
  const roundFilter=document.getElementById('pay-round-filter')?.value||'';
  const statusFilter=document.getElementById('pay-status-filter')?.value||'';
  const keyword=document.getElementById('pay-search')?.value.trim()||'';
  const listEl=document.getElementById('pay-list');
  const countEl=document.getElementById('pay-result-count');
  if(!listEl)return;
  listEl.innerHTML='<div class="loading-center"><div class="spinner"></div> 불러오는 중...</div>';

  try {
    // 납부 기록 — is_previous_owner 포함 조회
    let q=_sb.from('payment').select('연번,금액,납부일자,회차,is_previous_owner,owner:owner_id(이름)');
    if(roundFilter) q=q.eq('회차',parseInt(roundFilter));
    const {data:allPay}=await q.limit(5000);

    // 현재 소유주 납부 / 이전 소유주 납부 분리 집계
    const payMap={};
    (allPay||[]).forEach(p=>{
      const yn=p['연번'];
      if(!payMap[yn]) payMap[yn]={현재금액:0,현재건수:0,이전금액:0,이전건수:0,납부자:'—'};
      if(p['is_previous_owner']){
        payMap[yn].이전금액+=(p['금액']||0);
        payMap[yn].이전건수++;
      } else {
        payMap[yn].현재금액+=(p['금액']||0);
        payMap[yn].현재건수++;
        payMap[yn].납부자=p.owner?.이름||'—';
      }
    });

    // 활성 연번
    const allYeonbun=await fetchAll('yeonbun','연번',[['is_active',true]]);
    const totalYeonbun=allYeonbun.length;

    // 현재 소유주 납부가 있는 연번만 "납부완료"로 처리
    const paidYNs=Object.keys(payMap).filter(yn=>payMap[yn].현재건수>0).map(Number);
    const repNameMap={};
    for(let i=0;i<paidYNs.length;i+=500){ const {data}=await _sb.from('registration').select('연번,owner:owner_id(이름)').in('연번',paidYNs.slice(i,i+500)).eq('대표소유주',true); (data||[]).forEach(r=>{repNameMap[r['연번']]=r.owner?.이름||'—';}); }

    const paidSet=new Set(paidYNs);
    let rows=[];
    if(statusFilter===''||statusFilter==='납부'){
      let paidRows=paidYNs.map(yn=>({
        연번:yn, 이름:repNameMap[yn]||payMap[yn].납부자,
        현재금액:payMap[yn].현재금액, 현재건수:payMap[yn].현재건수,
        이전금액:payMap[yn].이전금액, 이전건수:payMap[yn].이전건수,
        납부:true
      }));
      if(keyword){const isNum=/^\d+$/.test(keyword); paidRows=paidRows.filter(r=>isNum?String(r.연번)===keyword:r.이름.includes(keyword));}
      rows=rows.concat(paidRows);
    }
    if(statusFilter===''||statusFilter==='미납'){
      let unpaidNums=allYeonbun.map(y=>y['연번']).filter(yn=>!paidSet.has(yn));
      if(keyword){
        const isNum=/^\d+$/.test(keyword);
        if(isNum){unpaidNums=unpaidNums.filter(yn=>String(yn)===keyword);}
        else{const {data:oList}=await _sb.from('owner').select('id').ilike('이름',`%${keyword}%`); if(oList?.length){const {data:yoList}=await _sb.from('registration').select('연번').in('owner_id',oList.map(o=>o.id)); const ms=new Set((yoList||[]).map(y=>y['연번'])); unpaidNums=unpaidNums.filter(yn=>ms.has(yn));}else{unpaidNums=[];}}
      }
      const slice=unpaidNums.slice(0,500);
      const unm={};
      for(let i=0;i<slice.length;i+=500){const {data}=await _sb.from('registration').select('연번,owner:owner_id(이름)').in('연번',slice.slice(i,i+500)).eq('대표소유주',true); (data||[]).forEach(r=>{unm[r['연번']]=r.owner?.이름||'—';}); }
      rows=rows.concat(slice.map(yn=>({연번:yn,이름:unm[yn]||'—',현재금액:0,현재건수:0,이전금액:0,이전건수:0,납부:false})));
    }
    rows.sort((a,b)=>a.연번-b.연번);
    countEl.textContent=`표시: ${rows.length}건 / 전체 ${totalYeonbun}연번`;
    if(!rows.length){listEl.innerHTML='<div class="empty-state"><div class="empty-icon">💳</div><p>검색 결과가 없습니다.</p></div>';return;}
    listEl.innerHTML=`<div class="table-wrap"><table>
      <thead><tr><th>연번</th><th>대표소유주</th><th>납부여부</th><th>현재소유주 납부액</th><th>이전소유주 납부액</th></tr></thead>
      <tbody>${rows.map(r=>`<tr onclick="openOwnerByYeonbun(${r.연번})">
        <td class="mono">${r.연번}</td>
        <td><strong>${r.이름}</strong></td>
        <td>${r.납부?'<span class="badge badge-green">납부완료</span>':'<span class="badge badge-yellow">미납</span>'}</td>
        <td class="mono" style="color:${r.납부?'var(--green)':'var(--text3)'}">${r.납부?r.현재금액.toLocaleString()+'원 ('+r.현재건수+'건)':'—'}</td>
        <td class="mono" style="color:${r.이전건수>0?'var(--yellow)':'var(--text3)'}">
          ${r.이전건수>0?r.이전금액.toLocaleString()+'원 ('+r.이전건수+'건)':'—'}
        </td>
      </tr>`).join('')}</tbody></table></div>`;
  } catch(e){listEl.innerHTML=`<div class="empty-state"><p>오류: ${e.message}</p></div>`;}
}

async function handlePayImport(event) {
  const file=event.target.files[0]; if(!file)return;
  const prevEl=document.getElementById('import-preview');
  prevEl.innerHTML='<div class="loading-center"><div class="spinner"></div> 파일 분석 중...</div>';
  try {
    const ab=await file.arrayBuffer();
    const wb=XLSX.read(ab,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{header:1});
    const rows=data.slice(1).filter(r=>r.length>0&&r[0]);
    if(!rows.length){prevEl.innerHTML='<div class="empty-state"><p>데이터가 없습니다.</p></div>';return;}

    const parsed=rows.map(r=>({
      연번: parseInt(r[0])||0,
      납부자: String(r[1]||''),
      금액: parseInt(String(r[2]||'0').replace(/[^0-9]/g,''))||0,
      납부일자: String(r[3]||''),
      회차: parseInt(r[4])||1,
      입금계좌: String(r[5]||''),
      메모: String(r[6]||'')
    })).filter(r=>r.연번>0);

    prevEl.innerHTML=`
      <div class="card">
        <div class="card-title">미리보기 — ${parsed.length}건</div>
        <div class="table-wrap" style="max-height:320px;overflow-y:auto"><table>
          <thead><tr><th>연번</th><th>납부자</th><th>금액</th><th>납부일자</th><th>회차</th><th>입금계좌</th></tr></thead>
          <tbody>${parsed.slice(0,50).map(r=>`<tr>
            <td class="mono">${r.연번}</td><td>${r.납부자}</td>
            <td class="mono" style="color:var(--green)">${r.금액.toLocaleString()}원</td>
            <td class="mono">${r.납부일자}</td><td>${r.회차}</td><td class="mono">${r.입금계좌||'—'}</td>
          </tr>`).join('')}' + (parsed.length>50 ? '<tr><td colspan="6" style="text-align:center;color:var(--text3)">... 외 '+(parsed.length-50)+'건</td></tr>' : '') + '</tbody>
        </table></div>
        <div style="display:flex;gap:10px;margin-top:16px">
          <button class="btn btn-blue" onclick="doPayImport(window._importData)">✅ ${parsed.length}건 DB에 저장</button>
          <button class="btn btn-ghost" onclick="document.getElementById('import-preview').innerHTML='';document.getElementById('import-file-input').value=''">취소</button>
        </div>
      </div>`;
    window._importData = parsed;
  } catch(e){prevEl.innerHTML=`<div class="empty-state"><p>파일 분석 오류: ${e.message}</p></div>`;}
}

async function doPayImport(parsed) {
  if(!parsed||!parsed.length)return;
  const btn=event.target; btn.disabled=true; btn.textContent='저장 중...';
  try {
    // 연번별 대표소유주 UUID 조회
    const ynNums=[...new Set(parsed.map(r=>r.연번))];
    const ownerMap={};
    for(let i=0;i<ynNums.length;i+=500){
      const {data}=await _sb.from('registration').select('연번,owner_id').in('연번',ynNums.slice(i,i+500)).eq('대표소유주',true);
      (data||[]).forEach(r=>{ownerMap[r['연번']]=r['owner_id'];});
    }
    const inserts=parsed.map(r=>({
      연번:r.연번, owner_id:ownerMap[r.연번]||null,
      회차:r.회차, 금액:r.금액, 납부일자:r.납부일자||null,
      입금계좌:r.입금계좌||null, 메모:r.메모||null
    }));
    let saved=0;
    for(let i=0;i<inserts.length;i+=100){
      const {error}=await _sb.from('payment').insert(inserts.slice(i,i+100));
      if(!error) saved+=Math.min(100,inserts.length-i);
    }
    showToast(`${saved}건 저장 완료!`,'success');
    document.getElementById('import-preview').innerHTML='';
    document.getElementById('import-file-input').value='';
    window._importData=null;
    await loadPaySummary();
  } catch(e){showToast('저장 오류: '+e.message,'error');}
  btn.disabled=false; btn.textContent='✅ DB에 저장';
}

async function printAllReceipts() {
  const roundNo=parseInt(document.getElementById('receipt-round-sel').value);
  const roundInfo=payRoundsGlobal.find(r=>r['회차']===roundNo);
  showToast('영수증 데이터 로드 중...','info');

  // 납부 기록 + 소유주 + 부동산 정보 한번에
  const {data:payments}=await _sb.from('payment')
    .select('연번,금액,납부일자,입금계좌,owner:owner_id(이름,생년월일_사업자번호)')
    .eq('회차',roundNo);
  if(!payments||!payments.length){showToast('납부 기록이 없습니다.','error');return;}

  // 연번별 합산
  const ynMap={};
  payments.forEach(p=>{
    if(!ynMap[p['연번']])ynMap[p['연번']]={금액:0,납부일자:'—',소유주:'—',계좌:'—'};
    ynMap[p['연번']].금액+=(p['금액']||0);
    ynMap[p['연번']].납부일자=p['납부일자']||'—';
    ynMap[p['연번']].소유주=p.owner?.이름||'—';
    ynMap[p['연번']].계좌=p['입금계좌']||'—';
  });

  // 연번 → 부동산코드(대표) 조회 + 동호수 조회 — 부동산코드 순 정렬용
  const ynNums=Object.keys(ynMap).map(Number);
  const ynPidMap={};
  for(let i=0;i<ynNums.length;i+=500){
    const {data}=await _sb.from('registration').select('연번,부동산코드').in('연번',ynNums.slice(i,i+500));
    (data||[]).forEach(r=>{ if(!ynPidMap[r['연번']])ynPidMap[r['연번']]=r['부동산코드']; });
  }
  // 부동산코드 → 동/호 조회
  const allPids=[...new Set(Object.values(ynPidMap))];
  const pidAddrMap={};
  for(let i=0;i<allPids.length;i+=500){
    const {data}=await _sb.from('property').select('부동산코드,동,호').in('부동산코드',allPids.slice(i,i+500));
    (data||[]).forEach(p=>{ pidAddrMap[p['부동산코드']]={dong:p['동'],ho:p['호']}; });
  }

  // 누적 납부총액 조회 (전 회차 합산 per 연번)
  const {data:allPays}=await _sb.from('payment').select('연번,금액').in('연번',ynNums);
  const cumMap={};
  (allPays||[]).forEach(p=>{ cumMap[p['연번']]=(cumMap[p['연번']]||0)+(p['금액']||0); });

  // 발행일
  const today=new Date();
  const issueDate=`${today.getFullYear()}년 ${String(today.getMonth()+1).padStart(2,'0')}월 ${String(today.getDate()).padStart(2,'0')}일`;

  // 부동산코드 기준 정렬
  const sorted=ynNums.sort((a,b)=>{
    const pa=ynPidMap[a]||'zzz', pb=ynPidMap[b]||'zzz';
    return pa.localeCompare(pb,'ko');
  });

  // 고유번호: 회차3자리-YYYYMMDD-부동산코드
  function makeUID(yn){
    const pid=ynPidMap[yn]||yn;
    const d=ynMap[yn].납부일자.replace(/-/g,'').replace(/\./g,'').replace(/[년월일 ]/g,'').slice(0,8);
    const dateStr = d||today.toISOString().slice(0,10).replace(/-/g,'');
    const roundPrefix = String(roundNo).padStart(3,'0');
    return `${roundPrefix}-${dateStr}-${pid}`;
  }

  function receiptBlock(yn, label) {
    const d=ynMap[yn];
    const pid=ynPidMap[yn]||'—';
    const addr=pidAddrMap[pid];
    const dongho=addr?`${addr.dong}동 ${addr.ho}호`:(pid||'—');
    const pd=d.납부일자||'—';
    let pdFmt=pd;
    const pm=pd.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(pm) pdFmt=`${pm[1]}년 ${pm[2]}월 ${pm[3]}일`;
    const cum=cumMap[yn]||d.금액;
    return `<table class="r-table">
        <tr><th colspan="2" class="r-title">운 영 경 비 납 부 영 수 증<br><span class="r-label-tag">${label}</span></th></tr>
        <tr><td class="r-key">고 유 번 호</td><td class="r-val r-mono">${makeUID(yn)}</td></tr>
        <tr><td class="r-key">소 유 주</td><td class="r-val r-bold">${d.소유주}</td></tr>
        <tr><td class="r-key">동 · 호 수</td><td class="r-val r-bold">${dongho}</td></tr>
        <tr><td class="r-key">납 부 일 자</td><td class="r-val r-bold">${pdFmt}</td></tr>
        <tr><td class="r-key">회 차 구 분</td><td class="r-val r-bold">${roundInfo?.['이름']||roundNo+'회차'}</td></tr>
        <tr class="r-highlight"><td class="r-key">납 부 금 액</td><td class="r-val r-big">${d.금액.toLocaleString()} 원</td></tr>
        <tr class="r-highlight"><td class="r-key">누 적 납 부 총 액</td><td class="r-val r-big">${cum.toLocaleString()} 원</td></tr>
        <tr><td class="r-key">발 행 일</td><td class="r-val r-bold">${issueDate}</td></tr>
        <tr><td colspan="2" class="r-footer">백마마을3456단지 통합재건축 주민대표단 (인)</td></tr>
      </table>`;
  }

  const printHtml=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>운영경비 영수증</title>
  <style>
    @page{size:A4 portrait;margin:10mm}
    body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;margin:0;padding:0}
    .receipt-page{width:100%;page-break-after:always;display:flex;flex-direction:column;justify-content:center;min-height:257mm;box-sizing:border-box;padding:8mm 0}
    .receipt-page:last-child{page-break-after:auto}
    .receipt-box{border:1.5px solid #333;width:100%}
    .r-table{width:100%;border-collapse:collapse;font-size:12pt}
    .r-table tr td,.r-table tr th{border:none;border-bottom:0.5px solid #bbb;padding:7px 10px}
    .r-title{text-align:center;font-size:15pt;font-weight:700;letter-spacing:4px;padding:14px 10px 8px;border-bottom:2px solid #333;line-height:1.6}
    .r-label-tag{display:inline-block;border:1px solid #555;font-size:10pt;padding:2px 10px;letter-spacing:1px;font-weight:400;margin-top:4px}
    .r-key{width:35%;font-size:11pt;letter-spacing:1px;color:#333;white-space:nowrap;padding-left:14px}
    .r-val{font-size:11pt;padding-left:6px}
    .r-bold{font-weight:600}
    .r-mono{font-family:monospace;font-size:10pt}
    .r-highlight td{background:#f0f0f0}
    .r-big{font-size:16pt;font-weight:700}
    .r-footer{text-align:center;font-size:11pt;padding:12px;border-top:2px solid #333;border-bottom:none;font-weight:500}
  </style></head><body>
  ${sorted.map((yn)=>{
    return `<div class="receipt-page">
      <div class="receipt-box">${receiptBlock(yn,'소유주 보관용')}</div>
    </div>`;
  }).join('')}
  </body></html>`;

  const w=window.open('','_blank','width=1000,height=800');
  w.document.write(printHtml);
  w.document.close();
  setTimeout(()=>w.print(),800);
}

function setActDateRange(range) {
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  let from = '', to = '';
  if(range === 'today')       { from = to = fmt(today); }
  else if(range === 'week')   { const d=new Date(today); d.setDate(d.getDate()-6); from=fmt(d); to=fmt(today); }
  else if(range === 'month')  { const d=new Date(today); d.setDate(d.getDate()-29); from=fmt(d); to=fmt(today); }
  const fromEl=document.getElementById('act-date-from');
  const toEl=document.getElementById('act-date-to');
  if(fromEl) fromEl.value=from;
  if(toEl)   toEl.value=to;
  loadActivityList();
}

async function loadActivityToday() {
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('act-date-from').value=today;
  document.getElementById('act-date-to').value=today;
  await loadActivityList();
}

async function loadActivityList() {
  const dateFrom=document.getElementById('act-date-from').value;
  const dateTo=document.getElementById('act-date-to').value;
  const staff=document.getElementById('act-staff-filter').value;
  const type=document.getElementById('act-type-filter').value;
  const listEl=document.getElementById('act-list');
  const countEl=document.getElementById('act-result-count');
  listEl.innerHTML='<div class="loading-center"><div class="spinner"></div> 불러오는 중...</div>';

  try {
    let q=_sb.from('activity_log').select('*').order('활동일시',{ascending:false}).limit(500);
    if(dateFrom) q=q.gte('활동일시',dateFrom+'T00:00:00');
    if(dateTo) q=q.lte('활동일시',dateTo+'T23:59:59');
    if(staff) q=q.eq('담당자',staff);
    if(type) q=q.eq('활동유형',type);
    const {data:logs}=await q;
    if(!logs||!logs.length){listEl.innerHTML='<div class="empty-state"><div class="empty-icon">📝</div><p>활동 기록이 없습니다.</p></div>';countEl.textContent='0건';return;}

    // 연번별 대표소유주 이름 조회
    const ynNums=[...new Set(logs.map(l=>l['연번']).filter(Boolean))];
    const nameMap={};
    for(let i=0;i<ynNums.length;i+=500){
      const {data}=await _sb.from('registration').select('연번,owner:owner_id(이름)').in('연번',ynNums.slice(i,i+500)).eq('대표소유주',true);
      (data||[]).forEach(r=>{nameMap[r['연번']]=r.owner?.이름||'—';});
    }

    countEl.textContent=`${logs.length}건`;
    const typeIcon={'방문':'🚶','전화':'📞','문자':'💬','카톡':'💛','기타':'📌'};
    const resultBadge={'제출완료':'badge-green','재연락필요':'badge-yellow','거부':'badge-red','부재':'badge-gray','기타':'badge-gray'};

    listEl.innerHTML=`<div style="display:flex;flex-direction:column;gap:8px">
      ${logs.map(l=>{
        const resultKey=l['결과']?.split('(')[0]||'기타';
        return `<div class="act-card">
          <div class="act-card-top">
            <span class="act-type-badge">${typeIcon[l['활동유형']]||'📌'} ${l['활동유형']}</span>
            <span class="badge ${resultBadge[resultKey]||'badge-gray'}">${l['결과']}</span>
            <span style="font-size:12px;color:var(--text2);margin-left:4px">연번 <strong>${l['연번']}</strong> ${nameMap[l['연번']]?'· '+nameMap[l['연번']]:''}</span>
            <span style="font-size:11px;color:var(--text3);margin-left:8px">담당: ${l['담당자']||'—'}</span>
            <div class="act-edit-btn" style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm" onclick="openActEdit('${l['id']}','${l['활동유형']}','${(l['결과']||'').replace(/'/g,'&apos;')}','${(l['내용']||'').replace(/'/g,'&apos;').replace(/\n/g,' ')}',${l['연번']})">✏️ 수정</button>
              <button class="btn btn-blue btn-sm" onclick="openOwnerByYeonbun(${l['연번']})">상세</button>
              <button class="btn btn-danger btn-sm" onclick="deleteActivityLogById('${l['id']}')">🗑 삭제</button>
            </div>
          </div>
          ${l['내용']?`<div style="font-size:12px;color:var(--text2);padding:4px 0">${l['내용']}</div>`:''}
          <div style="font-size:11px;color:var(--text3);margin-top:4px">${fmtKST(l['활동일시'])}</div>
        </div>`;
      }).join('')}
    </div>`;
  } catch(e){listEl.innerHTML=`<div class="empty-state"><p>오류: ${e.message}</p></div>`;}
}
